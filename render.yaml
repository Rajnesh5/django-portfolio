services:
  - type: web
    name: rajnesh-portfolio
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn portfolio.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure key
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "rajnesh-portfolio.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"
